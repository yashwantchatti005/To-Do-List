<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow Pro — Premium To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- ============ ANIMATED BACKGROUND ============ -->
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <!-- ============ CONFETTI CANVAS ============ -->
    <canvas id="confetti-canvas"></canvas>

    <!-- ============ APP CONTAINER ============ -->
    <div class="app">

        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo">
                    <div class="logo-icon">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                            <polyline points="22 4 12 14.01 9 11.01"/>
                        </svg>
                    </div>
                    <h1>Task<span>Flow</span></h1>
                </div>
            </div>
            <div class="header-right">
                <!-- Sound Toggle -->
                <button class="icon-btn" id="soundToggle" title="Toggle Sound Effects" aria-label="Toggle sound">
                    <svg class="sound-on" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <path d="M19.07 4.93a10 10 0 0 1 0 14.14"/>
                        <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
                    </svg>
                    <svg class="sound-off hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
                        <line x1="23" y1="9" x2="17" y2="15"/>
                        <line x1="17" y1="9" x2="23" y2="15"/>
                    </svg>
                </button>
                <!-- Theme Toggle -->
                <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle Dark Mode" aria-label="Toggle theme">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/>
                        <line x1="12" y1="1" x2="12" y2="3"/>
                        <line x1="12" y1="21" x2="12" y2="23"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="1" y1="12" x2="3" y2="12"/>
                        <line x1="21" y1="12" x2="23" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Progress Section -->
        <div class="progress-section">
            <div class="progress-info">
                <span class="progress-text" id="progressText">0 of 0 completed</span>
                <span class="progress-percent" id="progressPercent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>

        <!-- Main Card -->
        <main class="card">

            <!-- Search Bar -->
            <div class="search-wrapper">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="searchInput" class="search-input" placeholder="Search tasks..." autocomplete="off">
            </div>

            <!-- Add Task Section -->
            <div class="add-section">
                <div class="input-main">
                    <input type="text" id="taskInput" class="task-input" placeholder="What needs to be done?" autocomplete="off">
                    <button class="add-btn" id="addBtn" title="Add Task" aria-label="Add task">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>
                        </svg>
                    </button>
                </div>
                <div class="input-options">
                    <label class="date-picker" title="Set due date">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                            <line x1="16" y1="2" x2="16" y2="6"/>
                            <line x1="8" y1="2" x2="8" y2="6"/>
                            <line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        <input type="date" id="dueDateInput">
                        <span class="date-label" id="dateLabel">No date</span>
                    </label>
                    <div class="priority-group" id="priorityGroup">
                        <button class="priority-btn low active" data-priority="low">Low</button>
                        <button class="priority-btn medium" data-priority="medium">Med</button>
                        <button class="priority-btn high" data-priority="high">High</button>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="filters">
                <div class="filter-tabs" id="filterTabs">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                    <div class="filter-indicator" id="filterIndicator"></div>
                </div>
                <button class="clear-btn" id="clearCompleted" title="Clear completed tasks">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                    </svg>
                    Clear Done
                </button>
            </div>

            <!-- Task List Container -->
            <div class="task-list" id="taskList"></div>

            <!-- Empty State -->
            <div class="empty-state" id="emptyState">
                <svg class="empty-illustration" width="180" height="180" viewBox="0 0 200 200" fill="none">
                    <rect x="45" y="35" width="110" height="140" rx="12" stroke="currentColor" stroke-width="2" opacity="0.15" fill="currentColor" fill-opacity="0.03"/>
                    <rect x="72" y="24" width="56" height="18" rx="6" fill="currentColor" opacity="0.1"/>
                    <circle cx="72" cy="75" r="5" fill="currentColor" opacity="0.1"/>
                    <line x1="88" y1="75" x2="138" y2="75" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.1"/>
                    <circle cx="72" cy="97" r="5" fill="currentColor" opacity="0.08"/>
                    <line x1="88" y1="97" x2="128" y2="97" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.08"/>
                    <circle cx="72" cy="119" r="5" fill="currentColor" opacity="0.06"/>
                    <line x1="88" y1="119" x2="133" y2="119" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" opacity="0.06"/>
                    <circle cx="100" cy="140" r="22" fill="currentColor" opacity="0.06"/>
                    <polyline points="90,140 97,148 112,133" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.15"/>
                </svg>
                <h3>No tasks yet</h3>
                <p>Add your first task above to get started!</p>
            </div>

        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Built with ❤️ by TaskFlow Pro</p>
        </footer>

    </div>

    <!-- Floating Action Button (Mobile) -->
    <button class="fab" id="fab" title="Add new task" aria-label="Add new task">
        <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
    </button>

    <script src="app.js"></script>
</body>
</html>
